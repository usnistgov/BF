name: Deploy Hugo site to GitHub & NIST Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.108.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass Embedded
        run: sudo snap install dart-sass-embedded

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      # Build Hugo for GitHub Pages
      - name: Build Hugo for GitHub Pages
        env:
          HUGO_ENVIRONMENT: production
          BASE_URL: "https://usnistgov.github.io/BF/"
        run: |
          hugo --minify --baseURL "$BASE_URL" -d ./public/github

      # Build Hugo for NIST-Pages
      - name: Build Hugo for NIST-Pages
        env:
          HUGO_ENVIRONMENT: production
          BASE_URL: "https://pages.nist.gov/BF/"
        run: |
          hugo --minify --baseURL "$BASE_URL" -d ./public/nist

  deploy_github:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: ./public/github

  deploy_nist:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to NIST-Pages branch
        uses: usnistgov/nist-pages-deploy@v1
        with:
          folder: ./public/nist
          token: ${{ secrets.GITHUB_TOKEN }}
