name: Build and Deploy Hugo to NIST-Pages & GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.108.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass Embedded
        run: sudo snap install dart-sass-embedded

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Build Hugo site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --minify --baseURL "/BF/"

      - name: Upload Hugo build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hugo-public
          path: ./public

  deploy_nist:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Hugo public artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: ./public

      - name: Push HTML to nist-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B nist-pages || git checkout nist-pages
          git rm -rf .
          cp -r public/* .
          git add .
          git commit -m "Deploy Hugo HTML to nist-pages [ci skip]" || echo "No changes to commit."
          git push origin nist-pages --force

  deploy_github_redirect:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository (GitHub Pages)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create redirect index.html
        run: |
          cat > index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>Redirecting to NIST-Pages…</title>
            <meta http-equiv="refresh" content="0; url=https://pages.nist.gov/BF/">
            <link rel="canonical" href="https://pages.nist.gov/BF/">
          </head>
          <body>
            <p>If you are not redirected automatically, <a href="https://pages.nist.gov/BF/">click here</a>.</p>
          </body>
          </html>
          EOF

      - name: Commit and push redirect
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add redirect to NIST-Pages [ci skip]" || echo "No changes to commit."
          git push origin main
