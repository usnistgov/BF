name: Deploy Hugo site to GitHub & NIST Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.108.0
    steps:
      # 1️⃣ Checkout repository (full history for git)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # 2️⃣ Setup Node.js (for SCSS / npm packages)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install npm packages
        run: npm ci

      # 3️⃣ Install Hugo CLI
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      # 4️⃣ Install Dart Sass Embedded
      - name: Install Dart Sass Embedded
        run: sudo snap install dart-sass-embedded

      # 5️⃣ Setup GitHub Pages
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v2

      # 6️⃣ Build Hugo site for GitHub Pages
      - name: Build Hugo site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      # 7️⃣ Upload artifact for GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      # 8️⃣ Push HTML to nist-pages branch
      - name: Push Hugo HTML to nist-pages branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B nist-pages
          git rm -rf .
          cp -r public/* .
          git add .
          git commit -m "Deploy Hugo HTML [ci skip]" || echo "No changes to commit"
          git push origin nist-pages --force

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
