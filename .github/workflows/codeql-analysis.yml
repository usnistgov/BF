name: "CodeQL Analysis"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 11 * * 5'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    # Initialize CodeQL with explicit queries (self-contained advanced config)
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality  # default queries, fully managed here
        # optional: limit to specific paths to speed up scan
        # paths: src/

    # Autobuild (optional for JS, kept for completeness)
    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    # Perform analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        # upload all results automatically
        category: "/language:javascript"
